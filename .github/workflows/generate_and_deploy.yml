name: Generate and Deploy Stock Reports

on:
  schedule:
    - cron: '0 21 * * 1-5' # 平日毎日実行
  push:
    branches: [ master ] # コードが更新された時も実行
  workflow_dispatch: # 手動実行用

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # ブランチ名に応じて環境（Environment）を切り替える
    environment: ${{ github.ref_name == 'master' && 'production' || 'c1' }}
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libcurl4

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Restore yfinance cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/py-yfinance
          key: ${{ runner.os }}-yfinance-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-yfinance-

      - name: Restore stock reports cache
        uses: actions/cache@v4
        with:
          path: stock-blog/public/reports
          key: ${{ runner.os }}-stock-reports-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-stock-reports-

      - name: Create output directories
        run: |
          mkdir -p stock-blog/public/reports
          mkdir -p stock-blog/public/output_reports_full
          mkdir -p stock-blog/src/data/blog
          # If stocks.json doesn't exist, create an empty array
          [ -f stock-blog/src/data/stocks.json ] || echo "[]" > stock-blog/src/data/stocks.json

      - name: Run Python report generator
        run: PYTHONPATH=code python code/main.py
        env:
          TEST_MODE: false
          PYTHON_MAX_WORKERS: 1
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Raw Data to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put-multi code/data/raw_data/ --bucket stock-data-c1 --prefix raw/
          workingDirectory: .

      - name: Commit and push stocks.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stock-blog/src/data/stocks.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update master stock list [skip ci]" && git push origin HEAD)

      - name: Upload JSON Reports Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-raw-data
          path: code/data/raw_data/
          retention-days: 5

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-log
          path: run_log.txt
          retention-days: 7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: stock-blog/pnpm-lock.yaml

      - name: Install Node dependencies
        run: |
          cd stock-blog
          pnpm install --frozen-lockfile

      - name: Regenerate blog posts (Markdown)
        run: |
          cd stock-blog
          node scripts/generate-blog-posts.js

      - name: Build Astro site
        run: |
          cd stock-blog
          pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.CF_PROJECT_NAME }}
          workingDirectory: stock-blog
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
lare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=stock-blog
          workingDirectory: stock-blog
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
