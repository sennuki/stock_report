name: Generate and Deploy Stock Reports

on:
  schedule:
    # 毎日 22:00 UTC (ニューヨーク時間 17:00 / 日本時間 07:00) に実行
    # 米国市場は月〜金なので、データ更新は火〜土（UTC）
    - cron: '0 22 * * 2-6'
  push:
    branches: [ main, feature/workflow-test-no-deploy ]
  workflow_dispatch: # 手動実行用

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を制限（デプロイの競合を防ぐ）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libcurl4

      - name: Install Python dependencies
        run: uv pip install --system -r code/pyproject.toml

      - name: Create output directories
        run: |
          mkdir -p stock-blog/public/reports
          mkdir -p stock-blog/src/data
          echo "[]" > stock-blog/src/data/stocks.json

      - name: Run Python report generator
        run: PYTHONPATH=code python code/main.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-log
          path: run_log.txt
          retention-days: 7

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: stock-blog/pnpm-lock.yaml

      - name: Install Node dependencies
        run: |
          cd stock-blog
          pnpm install --frozen-lockfile

      # 1. 本番用ビルド (mainブランチのみ)
      - name: Build Production Site
        if: github.ref == 'refs/heads/main'
        env:
          ASTRO_BASE: "/"
        run: |
          cd stock-blog
          pnpm exec astro build --outDir dist-prod

      # 2. テスト用ビルド (全てのブランチ)
      - name: Build Test Site
        env:
          ASTRO_BASE: "/test"
        run: |
          cd stock-blog
          pnpm exec astro build --outDir dist-test

      # 3. 公開用ディレクトリの作成
      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy-root
          # テスト版を /test サブディレクトリに配置
          cp -r stock-blog/dist-test deploy-root/test
          
          # mainブランチの場合、本番版をルートに配置
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            cp -r stock-blog/dist-prod/* deploy-root/
          else
            # main以外の場合は、ルートにリダイレクトHTMLかプレースホルダーを置くなどの配慮
            echo "<html><body><h1>This is a test branch. Visit <a href='./test/'>/test/</a></h1></body></html>" > deploy-root/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy-root'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
