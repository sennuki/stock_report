name: Generate and Deploy Stock Reports

on:
  schedule:
    # 毎日 22:00 UTC (ニューヨーク時間 17:00 / 日本時間 07:00) に実行
    # 米国市場は月〜金なので、データ更新は火〜土（UTC）
    - cron: '0 22 * * 2-6'
  push:
    branches: [ main ]
  workflow_dispatch: # 手動実行用

# 同時実行を制限
concurrency:
  group: "deploy"
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libcurl4

      - name: Install Python dependencies
        run: uv pip install --system -r code/pyproject.toml

      - name: Create output directories
        run: |
          mkdir -p stock-blog/public/reports
          mkdir -p stock-blog/src/data
          echo "[]" > stock-blog/src/data/stocks.json

      - name: Run Python report generator
        run: PYTHONPATH=code python code/main.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-log
          path: run_log.txt
          retention-days: 7

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: stock-blog/pnpm-lock.yaml

      - name: Install Node dependencies
        run: |
          cd stock-blog
          pnpm install --frozen-lockfile

      - name: Build Astro Site
        env:
          ASTRO_BASE: "/"
        run: |
          cd stock-blog
          pnpm exec astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy stock-blog/dist --project-name=stock-report --branch=${{ github.head_ref || github.ref_name }}
