name: Data Pipeline and Deploy Pages

on:
  schedule:
    - cron: '0 21 * * 1-5' # 平日毎日実行
  push:
    branches: [ master ]
    paths-ignore:
      - '.github/workflows/translate_business_summaries.yml'
      - 'worker-processor/scripts/translate-business-summaries.mjs'
  workflow_dispatch:
    inputs:
      test_symbols:
        description: 'Comma-separated symbols to process (or "all"/"full" for full run). Empty = default test set MSFT,AAPL,NVDA'
        required: false
        default: ''

# 短時間に master へ連続 push されたとき、ジョブを並行起動させず
# 1 本ずつ順に実行する。実行中のジョブは最後まで走らせ (cancel-in-progress:
# false)、待機中の古いジョブのみ自動キャンセルされる。
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # generate-reports.mjs / main.py がレポート生成・データ取得する銘柄。
  # セクター ETF / SPY は fetch_raw_data 側で自動付与される。
  # 通常は "all" (S&P 500/400/600 全銘柄)。workflow_dispatch の
  # test_symbols 入力があればそれを優先する。
  TEST_SYMBOLS: ${{ github.event.inputs.test_symbols || 'all' }}

jobs:
  run-pipeline-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libcurl4

      - name: Install Python dependencies
        run: |
          cd code
          uv pip install --system -r requirements.txt

      - name: Set current date for cache key
        run: |
          echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "MONTH=$(date +'%Y-%m')" >> $GITHUB_ENV

      # push イベントはコード変更のデプロイのみ行い、株価生データの取得はしない。
      # push 時に取得すると「今日分フェッチ済み」フラグが立ち、市場終了後の
      # 定期実行 (21:00 UTC) が全銘柄をスキップしてしまうため。
      #
      # キャッシュキーは run_id + run_attempt にしてラン単位でスコープする。
      # 「同じ run の再実行 (Re-run failed jobs)」は restore-keys で同じ run_id の
      # 直近キャッシュを拾い、取得済み銘柄をスキップして残りだけ再取得する。
      # 別の run (別の workflow_dispatch / schedule) は run_id が異なるため
      # 古いキャッシュを引きずらず、毎回フレッシュに全銘柄を取得する。
      - name: Restore fetch status cache (same-run retry skip)
        if: github.event_name != 'push'
        uses: actions/cache@v4
        with:
          path: code/data/fetch_status.json
          key: fetch-status-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: fetch-status-${{ runner.os }}-${{ github.run_id }}-

      - name: Restore broker list cache
        if: github.event_name != 'push'
        uses: actions/cache@v4
        with:
          path: code/data/broker_lists
          key: broker-lists-${{ runner.os }}-${{ env.MONTH }}
          restore-keys: broker-lists-${{ runner.os }}-

      - name: Run Python Data Fetch (Uploads to R2)
        if: github.event_name != 'push'
        run: |
          cd code
          python main.py
        env:
          # TEST_SYMBOLS が "all" / "full" / 空のときは本番フル取得 (TEST_MODE=false)。
          # workflow_dispatch で具体銘柄を指定した場合のみ TEST_MODE=true にし、
          # main.py が symbols_override 経由でその銘柄群だけを処理するようにする。
          # ("full" は "all" の別名。GitHub Actions の文字列比較は大小無視なので
          #  "FULL"/"All" 等も同じ扱いになる)
          TEST_MODE: ${{ (env.TEST_SYMBOLS != '' && env.TEST_SYMBOLS != 'all' && env.TEST_SYMBOLS != 'full') && 'true' || 'false' }}
          PYTHON_MAX_WORKERS: 2
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "stock-data-c1"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Worker Processor (HTTP API only)
        run: |
          cd worker-processor
          npm ci

          echo "Current CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          npx wrangler whoami

          # Worker は /api/report/{symbol} を提供する HTTP API として残す。
          # batch 処理は本ジョブ内の Node.js スクリプトに移管した
          # (Cloudflare Workers の sub-request 制限を回避するため)。
          WORKER_OUTPUT=$(npx wrangler deploy)
          echo "$WORKER_OUTPUT"

          WORKER_URL=$(echo "$WORKER_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          if [ -n "$WORKER_URL" ]; then
            echo "WORKER_URL=$WORKER_URL" >> $GITHUB_ENV
            echo "Worker deployed at $WORKER_URL"
          else
            echo "Failed to extract Worker URL"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate reports/*.json on the runner
        run: |
          cd worker-processor
          # processAllStocks のロジックを Node.js script に移植したものを実行。
          # GitHub Actions runner なら Cloudflare Workers の sub-request 制限を
          # 受けないため、 1500銘柄 × GET+PUT を完走できる。
          # R2 アクセスは S3 互換 API (AWS SDK) 経由 -- Cloudflare REST API は
          # 1200 req/5min のグローバル制限があり 3000 リクエストでは破綻するため。
          # TEST_SYMBOLS が空のときはデフォルトのテスト銘柄 (MSFT,AAPL,NVDA) を処理。
          # 1500銘柄分の raw JSON はピークで 3-4GB に達し、Node のデフォルト
          # ヒープ (~4GB) では OOM になる。runner の RAM (~7GB) に合わせて
          # 6GB まで上げる (処理済み銘柄は順次 GC で回収される)。
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/generate-reports.mjs
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "stock-data-c1"
          # TEST_SYMBOLS はワークフローレベルの env から継承する。

      - name: Sync reports/stocks.json to build dir
        run: |
          # 上記ステップで R2 に書き込まれた reports/stocks.json をローカルに
          # 取得し、Astro ビルドに含める。
          cd worker-processor
          STOCKS_FILE=../stock-blog/src/data/stocks.json
          TMP=$(mktemp)
          if npx wrangler r2 object get stock-data-c1/reports/stocks.json \
             --file="$TMP" --remote 2>/dev/null; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('$TMP'))))" 2>/dev/null || echo 0)
            echo "stocks.json downloaded: $COUNT stocks"
            if [ "$COUNT" -gt 10 ]; then
              mv "$TMP" "$STOCKS_FILE"
            else
              rm -f "$TMP"
              echo "stocks.json has only $COUNT entries; keeping existing file"
            fi
          else
            rm -f "$TMP"
            echo "Failed to fetch stocks.json from R2; keeping existing file"
          fi

          # rankings.json も同様に取得。 reports/rankings.json は
          # ベスト100ランキングページ (/ranking/[metric]) のビルド時データソース。
          RANKINGS_FILE=../stock-blog/src/data/rankings.json
          TMP2=$(mktemp)
          if npx wrangler r2 object get stock-data-c1/reports/rankings.json \
             --file="$TMP2" --remote 2>/dev/null; then
            METRICS=$(python3 -c "import json; print(len(json.load(open('$TMP2'))))" 2>/dev/null || echo 0)
            echo "rankings.json downloaded: $METRICS metrics"
            if [ "$METRICS" -gt 0 ]; then
              mv "$TMP2" "$RANKINGS_FILE"
            else
              rm -f "$TMP2"
              echo "rankings.json has no metrics; keeping existing file"
            fi
          else
            rm -f "$TMP2"
            echo "Failed to fetch rankings.json from R2; keeping existing file"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and Deploy Astro to Cloudflare Workers
        run: |
          cd stock-blog
          export NODE_OPTIONS="--max-old-space-size=6656"
          pnpm install --no-frozen-lockfile

          # WORKER_URL は前段の "Deploy Worker Processor" ステップで $GITHUB_ENV に
          # 書き込まれている。Cloudflare Pages のプレビューデプロイは R2 バインディング
          # を持たないため、SSR 時に Worker の HTTP API 経由でレポートを取得する。
          export PUBLIC_WORKER_API_URL="$WORKER_URL"
          echo "Building with PUBLIC_WORKER_API_URL=$PUBLIC_WORKER_API_URL"
          pnpm run build

          # Worker としてデプロイ。
          # @astrojs/cloudflare アダプタは wrangler の environments を
          # サポートせず、ビルド時に設定を dist/server/wrangler.json へ
          # フラット化する (.wrangler/deploy/config.json で redirect)。
          # そのため wrangler.jsonc の env.production も --env production も
          # 無視される。生成済み設定の Worker 名を本番 (stock-blog) に変更。
          #
          # routes は宣言しない: amerikabu.com / www.amerikabu.com の
          # カスタムドメインは初回デプロイで紐付け済みで Cloudflare 側に
          # 永続する。routes を宣言すると wrangler が再デプロイ毎に
          # /zones/.../workers/routes を照合し、CLOUDFLARE_API_TOKEN に
          # zone の Workers Routes 権限が無いと Authentication error で
          # 失敗する。del(.routes) で生成設定からも routes を確実に除去。
          GEN_CFG=dist/server/wrangler.json
          echo "Deploying site Worker: stock-blog"
          jq 'del(.routes) | .name = "stock-blog"' "$GEN_CFG" > "$GEN_CFG.tmp"
          mv "$GEN_CFG.tmp" "$GEN_CFG"
          DEPLOY_OUTPUT=$(npx wrangler deploy)
          echo "$DEPLOY_OUTPUT"

          # デプロイされたWorkerのURLを抽出
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          echo "WORKERS_DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

          # GitHub Job Summary に書き込み（Workers）
          {
            echo "### 🚀 Pipeline & Deployment Successful!"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Commit:** [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA})"
            echo ""
            echo "#### ☁️ Cloudflare Workers (本番)"
            echo "- Site URL: [$DEPLOY_URL]($DEPLOY_URL)"
            echo "- Worker API: [$WORKER_URL]($WORKER_URL)"
          } >> $GITHUB_STEP_SUMMARY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

