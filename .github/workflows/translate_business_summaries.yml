name: Translate Business Summaries

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum translations for this run'
        required: false
        default: '3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: translate-business-summaries-c1
  cancel-in-progress: false

jobs:
  translate-business-summaries:
    runs-on: ubuntu-latest
    environment: c1
    permissions:
      contents: read
    steps:
      - name: Checkout c1 repository code
        uses: actions/checkout@v4
        with:
          ref: c1
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd worker-processor
          npm install

      - name: Translate missing business summaries
        run: |
          cd worker-processor
          node scripts/translate-business-summaries.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_TRANSLATION_MODEL: "gemini-3.1-flash-lite-preview"
          TRANSLATION_LIMIT: ${{ github.event.inputs.limit || '3' }}
          TRANSLATION_SUMMARY_OUTPUT: "translation-summary.json"
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "stock-data-c1"
          BUSINESS_SUMMARY_TRANSLATIONS_KEY: "translations/business_summaries.json"

      - name: Summarize translated symbols
        if: always()
        run: |
          cd worker-processor
          {
            echo "### Business Summary Translation"
            echo ""
            echo "- Code branch: c1"
            if [ -f translation-summary.json ]; then
              node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('translation-summary.json','utf8')); console.log('- Translated: ' + s.translated); console.log('- Symbols: ' + (s.translated_symbols.length ? s.translated_symbols.join(', ') : '(none)')); console.log('- Skipped existing Japanese: ' + s.skipped_japanese); console.log('- Skipped no source: ' + s.skipped_no_source); console.log('- Failed: ' + s.failed);"
            else
              echo "- Summary file was not created."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
