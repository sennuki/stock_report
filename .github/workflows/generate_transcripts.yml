name: Generate Earnings Transcripts

# 各銘柄の最新四半期の決算説明会トランスクリプトを和訳・要約し、R2 に蓄積する。
# 制約への対応:
#   - gemma-4-26b-a4b-it は 1 日 1500 リクエスト。1 本あたり概算 14 回消費。
#     translate_summary を flash-lite へ移したため gemma はトランスクリプトが専有。
#   - gemma は応答が遅く 1 本あたり約 13.5 分。1 実行は TRANSCRIPT_MAX_MINUTES=300
#     により約 22 本で頭打ち。1 日 3 回 ≒ 66 本/日（≒ 920 回）で 1500 内に収まる。
#   - GitHub Actions は 1 ジョブ 6 時間まで。job の timeout-minutes と
#     TRANSCRIPT_MAX_MINUTES の二段で安全に打ち切る。
#   - R2 は 10GB まで。md 1 本は約 90KB と小さく、最新四半期のみのため増加は緩やか。
# 索引・md とも R2 のみに保存し、Git へはコミットしない（ページが SSR で読む）。

on:
  schedule:
    # 1 日 3 回（8 時間おき）。各実行 約5h で非重複。21:00 のデータパイプラインを避ける。
    - cron: '0 2,10,18 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: '1 回の実行で生成する最大本数'
        required: false
        default: '25'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: generate-transcripts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-transcripts:
    runs-on: ubuntu-latest
    # GitHub Actions の 6 時間上限に対する安全余裕。
    timeout-minutes: 330
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libcurl4

      - name: Install Python dependencies
        run: |
          cd code
          uv pip install --system -r requirements.txt

      - name: Generate transcripts (latest quarter per symbol)
        run: |
          cd code
          python run_transcript_batch.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 1 回の実行で生成する最大本数。実際は TRANSCRIPT_MAX_MINUTES により
          # 約 22 本で頭打ちになる（gemma は 1 本あたり約 13.5 分）。
          TRANSCRIPT_LIMIT: ${{ github.event.inputs.limit || '25' }}
          # この分数を超えたら新規生成を打ち切る（6h ジョブ上限対策）。
          TRANSCRIPT_MAX_MINUTES: '300'
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "stock-data-c1"
