name: Generate Movement Reasons

# 株価が大きく変動した銘柄 (全指数横断で |z| 上位約20銘柄) の理由を
# gemini-2.5-flash-lite + Google 検索グラウンディングで生成する。
# データ取得パイプライン (Data Pipeline and Deploy Pages) の完了を検知して
# 自動起動するため、約2時間の株価取得を待つだけで、本ワークフロー自体は
# R2 上の既存 raw データを読むだけの軽量処理 (約10〜15分)。

on:
  # データ取得パイプラインが完了したら自動起動する。
  workflow_run:
    workflows: ["Data Pipeline and Deploy Pages"]
    types: [completed]
  # 手動実行も可能にする (当日分の再生成や検証用)。
  workflow_dispatch:
    inputs:
      force:
        description: '当日生成済みでも強制的に再生成する'
        type: boolean
        default: false

# 連続トリガー時にジョブを多重起動させない。
concurrency:
  group: movement-reasons
  cancel-in-progress: false

jobs:
  movement-reasons:
    # データ取得パイプラインが成功で完了したとき、または手動実行時のみ走らせる。
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd worker-processor
          npm install

      - name: Generate movement reasons
        # R2 の raw データを読み |z| 上位約20銘柄を選定 → 理由生成 →
        # reports/movement_reasons.json と該当 reports/{symbol}.json を更新。
        timeout-minutes: 25
        run: |
          cd worker-processor
          node scripts/generate-movement-reasons.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MOVEMENT_REASON_MODEL: "gemini-2.5-flash-lite"
          MOVEMENT_TARGET: '18'
          # gemini-2.5-flash-lite の Google 検索グラウンディング無料枠は
          # 実測で約19回/日。余裕を取り18回で頭打ちにし 429 を回避する。
          MOVEMENT_API_BUDGET: '18'
          # ハード上限の下ではリトライ1回 = 新規1銘柄を諦めることになり
          # 網羅率がむしろ下がるため、再試行せず1銘柄1リクエストとする。
          MOVEMENT_MAX_ATTEMPTS: '1'
          GEMINI_RPM: '13'
          # workflow_dispatch の force 入力。workflow_run 起動時は空文字。
          FORCE_MOVEMENT_REASONS: ${{ github.event.inputs.force }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "stock-data-c1"
