name: Test Data Pipeline (3 Stocks)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Fetch Raw Data (3 Stocks)
        run: |
          cd code
          uv run python fetch_raw_data.py MSFT AAPL GOOGL
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node dependencies
        run: |
          cd stock-blog
          pnpm install

      - name: Run Transform Test (TypeScript)
        run: |
          cd stock-blog
          # 3銘柄すべてをテストするようにスクリプトを調整して実行
          npx tsx scripts/test-transform.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transformed-reports
          path: stock-blog/public/reports/*.json
